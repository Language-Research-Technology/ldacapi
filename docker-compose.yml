networks:
  ldacapi:
    name: ldacapi
    driver: bridge

volumes:
  postgres_data:
  opensearch_data:

services:
  db:
    restart: always
    image: postgres:17-alpine
    hostname: db
    container_name: ldacapi_db
    tty: true
    environment:
      TERM: "xterm-256color"
      NODE_ENV: "production"
      POSTGRES_DB: "ldacapi"
      POSTGRES_USER: "ldacapi"
      POSTGRES_PASSWORD: "ldacapi"
      POSTGRES_HOST_AUTH_METHOD: "trust"
      PGDATA: /postgresql/data
    volumes:
      - postgres_data:/postgresql
    ports:
      - "5432:5432"
    networks:
      - ldacapi

  opensearch:
    restart: always
    image: opensearchproject/opensearch:3.3.0
    hostname: opensearch
    container_name: ldacapi_opensearch
    tty: true
    environment:
      - TERM=xterm-256color
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - _JAVA_OPTIONS= #this fixes Mac M4 bug
      #- xpack.security.enabled=false # for elasticsearch
      - plugins.security.disabled=true # for opensearch
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=ABCDE1234!
      - DISABLE_INSTALL_DEMO_CONFIG=true
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - ldacapi